function safeParseJSON(text) {
  if (!text) throw new Error("Empty response from LLM");
  try { return JSON.parse(text.trim()); } catch {}
  const stripped = text.replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try { return JSON.parse(stripped); } catch {}
  const match = text.match(/\{[\s\S]*\}/);
  if (match) { try { return JSON.parse(match[0]); } catch {} }
  throw new Error("Could not parse JSON from LLM response. Raw:\n" + text.slice(0,300));
}

async function callOpenRouter(apiKey, prompt, model) {
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${apiKey}`,
      "Content-Type": "application/json",
      "HTTP-Referer": window.location.href,
      "X-Title": "LLM Evals Demo"
    },
    body: JSON.stringify({
      model: model || "google/gemini-2.0-flash-exp:free",
      messages: [{ role:"user", content: prompt }],
      temperature: 0
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`OpenRouter error ${res.status}: ${err.error?.message || res.statusText}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callGemini(apiKey, prompt, model) {
  const m = model || "gemini-1.5-flash";
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`Gemini error ${res.status}: ${err.error?.message || res.statusText}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(`Gemini: ${data.error.message}`);
  return data.candidates[0].content.parts[0].text;
}

async function callOllama(baseUrl, model, prompt) {
  const url = (baseUrl || "http://localhost:11434").replace(/\/$/, "");
  const res = await fetch(`${url}/api/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: model || "llama3.2",
      messages: [{ role:"user", content: prompt }],
      stream: false,
      options: { temperature: 0 }
    })
  });
  if (!res.ok) throw new Error(`Ollama error ${res.status}: ${res.statusText}. Is Ollama running with OLLAMA_ORIGINS='*'?`);
  const data = await res.json();
  return data.message?.content || data.response || "";
}

async function callLLM(settings, prompt) {
  const { provider, apiKey, model, ollamaUrl, ollamaModel } = settings;
  if (provider === "openrouter") return callOpenRouter(apiKey, prompt, model);
  if (provider === "gemini")     return callGemini(apiKey, prompt, model);
  if (provider === "ollama")     return callOllama(ollamaUrl, ollamaModel, prompt);
  throw new Error("Unknown provider");
}

function isLiveMode(settings) {
  if (settings.provider === "ollama") return true;
  return settings.apiKey.trim().length > 0;
}

/* Normalise judge output — LLMs return scores as array OR object */
function normalizeJudgeResult(parsed, rubric) {
  let scores;
  if (Array.isArray(parsed.scores)) {
    scores = parsed.scores.map(Number);
  } else if (parsed.scores && typeof parsed.scores === "object") {
    scores = rubric.map(r => {
      const key = Object.keys(parsed.scores).find(k => k.toLowerCase() === r.toLowerCase()) || r;
      return Number(parsed.scores[key]) || 3;
    });
  } else {
    scores = rubric.map(() => 3);
  }
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  const overall = Number(parsed.overall) || parseFloat(avg.toFixed(2));
  const verdict = parsed.verdict ||
    (overall >= 4 ? "Pass" : overall >= 2.5 ? "Borderline" : "Fail");
  return {
    scores,
    overall,
    reasoning: parsed.reasoning || parsed.explanation || "No reasoning provided.",
    verdict
  };
}

function buildJudgePrompt(taskPrompt, response, rubric) {
  const criteria = rubric.map(r => `  - ${r}: 1 (very poor) to 5 (excellent)`).join("\n");
  return `You are an expert evaluator. Score the model response below.

TASK GIVEN TO THE MODEL:
${taskPrompt}

MODEL RESPONSE:
${response}

RUBRIC — score each criterion independently on a 1–5 integer scale:
${criteria}

Rules:
- Score each criterion independently — do not let strengths in one inflate others
- Response length alone must NOT increase scores
- If the response contains factual errors, Accuracy MUST be 1 or 2 regardless of other qualities

Return ONLY valid JSON, no other text:
{
  "scores": {${rubric.map(r=>`"${r}": <int>`).join(", ")}},
  "overall": <float>,
  "reasoning": "<2–3 sentences on key strengths and weaknesses>",
  "verdict": "Pass" | "Borderline" | "Fail"
}`;
}

function buildVerifierPrompt(claim, domain, extra) {
  const guidance = {
    factual: "Check against established facts and scientific consensus. State what the truth actually is.",
    mathematical: "Work through the mathematics step by step before giving a verdict.",
    code: "Trace through the code logic for each test case before giving a verdict.",
    general: "Apply careful reasoning before giving a verdict.",
  }[domain] || "Apply careful reasoning.";

  return `You are a ${domain || "general"} verification assistant.

CLAIM TO VERIFY:
${claim}
${extra ? `\nCONTEXT:\n${extra}` : ""}

GUIDANCE: ${guidance}

Return ONLY valid JSON:
{
  "verdict": "PASS" | "FAIL" | "UNCERTAIN",
  "confidence": <integer 0–100>,
  "reasoning": "<concise explanation>",
  "notes": "<optional: edge cases, caveats>"
}`;
}

    <span class="kw">except</span>: <span class="kw">pass</span>
    cleaned = re.sub(<span class="str">r'\`\`\`json?\s*|\`\`\`'</span>, <span class="str">''</span>, text).strip()
    <span class="kw">try</span>: <span class="kw">return</span> json.loads(cleaned)
    <span class="kw">except</span>: <span class="kw">pass</span>
    m = re.search(<span class="str">r'\{.*\}'</span>, text, re.DOTALL)
    <span class="kw">if</span> m: <span class="kw">return</span> json.loads(m.group())
    <span class="kw">raise</span> ValueError(<span class="str">"No JSON in judge output"</span>)

<span class="cm"># 6. ALWAYS temperature=0 for deterministic, reproducible evals</span>
<span class="cm"># 7. CALIBRATE: build a human-labelled golden set first</span>
<span class="cm">#    Measure judge-human agreement before trusting judge at scale</span>`
};

function ScoreBar({ score, color }) {
  const [w, setW] = useState(0);
  useEffect(() => { const t = setTimeout(() => setW((score/5)*100), 80); return ()=>clearTimeout(t); }, [score]);
  return (
    <div style={{background:"#e2e8f0",borderRadius:99,height:7,overflow:"hidden",flex:1}}>
      <div style={{width:`${w}%`,height:"100%",background:color,borderRadius:99,transition:"width .8s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

function VerdictBadge({ verdict }) {
  const map = {
    Pass:      {bg:"#f0fdf4",border:"#86efac",text:"#16a34a",icon:"✓"},
    Borderline:{bg:"#fffbeb",border:"#fcd34d",text:"#b45309",icon:"~"},
    Fail:      {bg:"#fff5f7",border:"#fda4af",text:"#be123c",icon:"✗"},
    PASS:      {bg:"#f0fdf4",border:"#86efac",text:"#16a34a",icon:"✓"},
    FAIL:      {bg:"#fff5f7",border:"#fda4af",text:"#be123c",icon:"✗"},
    UNCERTAIN: {bg:"#fffbeb",border:"#fcd34d",text:"#b45309",icon:"?"},
  };
  const s = map[verdict] || map.Borderline;
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,background:s.bg,
      border:`1.5px solid ${s.border}`,borderRadius:20,padding:"4px 12px",

}

/* ── Judge Tab ── */
function JudgeTab({ settings }) {
  const [taskId,      setTaskId]      = useState("gradient");
  const [responseId,  setResponseId]  = useState(null);
  const [judging,     setJudging]     = useState(false);
  const [result,      setResult]      = useState(null);
  const [error,       setError]       = useState(null);
  const [showPrompt,  setShowPrompt]  = useState(false);
  const [liveMode,    setLiveMode]    = useState(false);
  const resultRef = useRef(null);

  const task = TASKS.find(t => t.id === taskId);
  const live = isLiveMode(settings);

  function handleTaskChange(id) {
    setTaskId(id); setResponseId(null); setResult(null); setError(null); setShowPrompt(false);
  }

  async function handleJudge() {
    if (!responseId) return;
    setJudging(true); setResult(null); setError(null);
    const selectedResponse = task.responses.find(r => r.id === responseId);

    try {
      if (live) {
        setLiveMode(true);
        const prompt = buildJudgePrompt(task.prompt, selectedResponse.text, task.rubric);
        const raw = await callLLM(settings, prompt);
        const parsed = safeParseJSON(raw);
        setResult(normalizeJudgeResult(parsed, task.rubric));
      } else {
        await new Promise(r => setTimeout(r, 1800));
        setResult(task.judgements[responseId]);
      }
    } catch(err) {
      setError(err.message);
    } finally {
      setJudging(false);
      setTimeout(() => resultRef.current?.scrollIntoView({behavior:"smooth",block:"nearest"}), 100);
    }
  }

  const selectedResponse = task.responses.find(r => r.id === responseId);
  const qualityColor = {good:"#16a34a", mediocre:"#b45309", bad:"#be123c"};
  const qualityPale  = {good:"#f0fdf4", mediocre:"#fffbeb", bad:"#fff5f7"};
  const judgePromptText = responseId
    ? buildJudgePrompt(task.prompt, selectedResponse?.text || "", task.rubric)
    : "";

  return (
    <div>
      {/* Mode badge */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,
          background: live ? "#f0fdf4" : "#fffbeb",
          border:`1.5px solid ${live?"#86efac":"#fcd34d"}`,borderRadius:20,
          padding:"4px 12px",fontFamily:"'Nunito'",fontSize:11,fontWeight:700,
          color: live ? "#16a34a" : "#b45309"}}>
          {live ? "🟢 Live mode — real LLM" : "🔵 Simulation mode"}
        </div>
        {!live && <span style={{fontFamily:"'Nunito'",fontSize:11,color:"#94a3b8"}}>Add API key in Settings for live judging</span>}
        {live && <span style={{fontFamily:"'Nunito'",fontSize:11,color:"#94a3b8"}}>Using {settings.provider} · {settings.provider==="ollama" ? settings.ollamaModel : (settings.model || "default model")}</span>}
      </div>

      {/* Task selector */}
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'Nunito'",fontSize:10,fontWeight:700,color:"#6366f1",
          textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>1 · Choose a task</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {TASKS.map(t => (
            <button key={t.id} onClick={() => handleTaskChange(t.id)} style={{
              background:taskId===t.id?"#e0e7ff":"white",
              border:`${taskId===t.id?2:1.5}px solid ${taskId===t.id?"#a5b4fc":"#e2e8f0"}`,
              borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"'Nunito'",
              fontSize:12,fontWeight:600,color:taskId===t.id?"#6366f1":"#64748b",transition:"all .18s"}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Response selector */}

            const qc = qualityColor[r.quality]; const qp = qualityPale[r.quality];
            const active = responseId===r.id;

                background:active?qp:"white",

      {responseId && (
        <div style={{marginBottom:12}}>
          <button onClick={() => setShowPrompt(p=>!p)} style={{background:"transparent",border:"none",
            cursor:"pointer",fontFamily:"'Nunito'",fontSize:11,fontWeight:600,color:"#6366f1",

        fontFamily:"'Nunito'",fontSize:13,fontWeight:700,

        cursor:responseId&&!judging?"pointer":"not-allowed",
        transition:"all .2s",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
        {judging ? <><span className="spin">⚙</span> {live?"Calling LLM…":"Judging…"}</> : <>⚖ Judge this response</>}
      </button>

      {judging && (
        <div style={{background:"#e0e7ff",border:"1.5px solid #a5b4fc",borderRadius:12,
          padding:"14px 16px",marginBottom:14}}>
          {(live

/* ── pass@k Tab (interactive sampling demo) ── */
const PASSK_SCENARIOS = [
  { id:"math",  label:"MATH-500 (hard)", icon:"🧮", color:"#0d9488", pale:"#f0fdfa", border:"#5eead4",
    p:0.34, verifier:0.92, wrong:["12","−3","0","42","√2"],
    desc:"Small reasoning model, hard problem. Low single-shot accuracy but real headroom — the gap pass@k exposes." },
  { id:"nl2sql", label:"NL2SQL (medium)", icon:"🗄️", color:"#6366f1", pale:"#e0e7ff", border:"#a5b4fc",
    p:0.58, verifier:0.97, wrong:["wrong JOIN","no GROUP BY","bad filter"],
    desc:"Text-to-SQL with an execution verifier (≈perfect check). Best-of-N reranking by execution is a cheap accuracy win." },
  { id:"chat",  label:"Multilingual QA", icon:"💬", color:"#8b5cf6", pale:"#f5f3ff", border:"#c4b5fd",
    p:0.71, verifier:0.78, wrong:["off-topic","wrong language"],
    desc:"Factual QA across languages. No clean verifier, so maj@k (self-consistency) stabilises the modal answer." },
];

function comb(n,k){ if(k<0||k>n) return 0; k=Math.min(k,n-k); let r=1; for(let i=0;i<k;i++) r=r*(n-i)/(i+1); return r; }
function passAtK(n,c,k){ if(n-c<k) return 1; return 1 - comb(n-c,k)/comb(n,k); }

function PassKTab() {
  const [scenarioId, setScenarioId] = useState("math");
  const [n, setN]         = useState(8);
  const [samples, setSamples] = useState(null);
  const [drawing, setDrawing] = useState(false);
  const sc = PASSK_SCENARIOS.find(s => s.id === scenarioId);

  function reset(id){ setScenarioId(id); setSamples(null); }

  function draw(){
    setDrawing(true); setSamples(null);
    setTimeout(() => {
      const out = [];
      for (let i=0;i<n;i++){
        const correct = Math.random() < sc.p;
        const answer  = correct ? "correct" : sc.wrong[Math.floor(Math.random()*sc.wrong.length)];
        // noisy verifier score: correct samples score higher, but with overlap set by sc.verifier
        const sep = (sc.verifier - 0.5) * 2;                 // 0..1 separation
        const base = correct ? 0.5 + 0.5*sep : 0.5 - 0.5*sep;
        const score = Math.max(0, Math.min(1, base + (Math.random()-0.5)*(1-sep)));
        out.push({ correct, answer, score });
      }
      setSamples(out);
      setDrawing(false);
    }, 650);
  }

  // metrics from the draw
  let metrics = null;
  if (samples){
    const c = samples.filter(s=>s.correct).length;
    // tally answers for self-consistency
    const tally = {};
    samples.forEach(s => { tally[s.answer] = (tally[s.answer]||0)+1; });
    let mode=null, modeCount=-1, tie=false;
    Object.entries(tally).forEach(([a,ct]) => {
      if (ct>modeCount){ mode=a; modeCount=ct; tie=false; }
      else if (ct===modeCount){ tie=true; }
    });
    const majCorrect = (mode==="correct") && !tie;
    // best-of-n: pick highest verifier score
    let best = samples[0]; samples.forEach(s => { if (s.score>best.score) best=s; });
    metrics = {
      c, n,
      pass1: c/n,
      passN: c>0 ? 1 : 0,
      passNest: passAtK(n,c,n),         // == 1 if c>0
      maj: majCorrect,
      best: best.correct,
      curve: Array.from({length:n}, (_,i)=> passAtK(n,c,i+1)),
    };
  }

  const card = (label, ok, sub, color) => (
    <div style={{flex:1,background:ok?"#f0fdf4":"#fff5f7",border:`1.5px solid ${ok?"#86efac":"#fda4af"}`,
      borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
      <div style={{fontFamily:"'Nunito'",fontSize:10,fontWeight:700,textTransform:"uppercase",
        letterSpacing:"0.06em",color:"#64748b",marginBottom:4}}>{label}</div>
      <div style={{fontFamily:"'Cormorant Garamond'",fontSize:24,fontWeight:700,
        color:ok?"#16a34a":"#be123c"}}>{ok?"✓":"✗"}</div>
      <div style={{fontFamily:"'Nunito'",fontSize:10,color:"#94a3b8",marginTop:2}}>{sub}</div>
    </div>
  );

  return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond'",fontStyle:"italic",fontSize:15,
        color:"#64748b",marginBottom:18,lineHeight:1.7}}>
        pass@k asks a different question than the judge or verifier: <b>not “is this output good?” but “can the model get it right at all, given k tries?”</b> Draw samples and watch coverage diverge from single-shot accuracy.
      </div>

      {/* scenario */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"'Nunito'",fontSize:10,fontWeight:700,color:"#0d9488",
          textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>1 · Choose a scenario</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {PASSK_SCENARIOS.map(s => (
            <button key={s.id} onClick={()=>reset(s.id)} style={{
              background:scenarioId===s.id?s.pale:"white",
              border:`${scenarioId===s.id?2:1.5}px solid ${scenarioId===s.id?s.border:"#e2e8f0"}`,
              borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"'Nunito'",fontSize:12,
              fontWeight:600,color:scenarioId===s.id?s.color:"#64748b",display:"flex",alignItems:"center",gap:6}}>
              {s.icon} {s.label}
            </button>
          ))}
        </div>
        <div style={{marginTop:8,background:sc.pale,border:`1px solid ${sc.border}`,borderRadius:10,
          padding:"9px 13px",fontFamily:"'Nunito'",fontSize:12,color:"#475569",lineHeight:1.55}}>
          {sc.desc} <span style={{color:sc.color,fontWeight:700}}>· per-sample success p ≈ {sc.p} · verifier acc ≈ {sc.verifier}</span>
        </div>
      </div>

      {/* n slider + draw */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:"1 1 260px"}}>
          <div style={{fontFamily:"'Nunito'",fontSize:10,fontWeight:700,color:"#0d9488",
            textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>2 · Samples to draw — n = {n}</div>
          <input type="range" min="2" max="20" value={n}
            onChange={e=>{setN(parseInt(e.target.value)); setSamples(null);}}
            style={{width:"100%",accentColor:sc.color}}/>
        </div>
        <button onClick={draw} disabled={drawing} style={{
          background:drawing?"#e2e8f0":`linear-gradient(135deg,${sc.color},#6366f1)`,
          border:"none",borderRadius:10,padding:"11px 22px",fontFamily:"'Nunito'",fontSize:13,
          fontWeight:700,color:drawing?"#94a3b8":"white",cursor:drawing?"not-allowed":"pointer",
          display:"flex",alignItems:"center",gap:8}}>
          {drawing ? <><span className="spin">⚙</span> Sampling…</> : <>🎲 Draw {n} samples</>}
        </button>
      </div>

      {/* samples grid */}
      {samples && (
        <div className="slide" style={{marginBottom:16}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
            {samples.map((s,i) => (
              <div key={i} title={`verifier score ${s.score.toFixed(2)}`} style={{
                minWidth:64,flex:"0 0 auto",background:s.correct?"#f0fdf4":"#fff5f7",
                border:`1.5px solid ${s.correct?"#86efac":"#fda4af"}`,borderRadius:9,
                padding:"7px 9px",textAlign:"center"}}>
                <div style={{fontFamily:"'Nunito'",fontSize:9,color:"#94a3b8",fontWeight:700}}>#{i+1}</div>
                <div style={{fontFamily:"'Nunito'",fontSize:12,fontWeight:700,
                  color:s.correct?"#16a34a":"#be123c"}}>{s.correct?"✓ correct":s.answer}</div>
              </div>
            ))}
          </div>
          <div style={{fontFamily:"'Nunito'",fontSize:11,color:"#94a3b8"}}>
            {metrics.c} of {metrics.n} samples correct (c = {metrics.c})
          </div>
        </div>
      )}

      {/* metrics */}
      {samples && (
        <div className="slide">
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:120,background:"#eef6f9",border:"1.5px solid #cbd5e1",
              borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
              <div style={{fontFamily:"'Nunito'",fontSize:10,fontWeight:700,textTransform:"uppercase",
                letterSpacing:"0.06em",color:"#64748b",marginBottom:4}}>pass@1</div>
              <div style={{fontFamily:"'Cormorant Garamond'",fontSize:24,fontWeight:700,color:"#1e293b"}}>
                {(metrics.pass1*100).toFixed(0)}%</div>
              <div style={{fontFamily:"'Nunito'",fontSize:10,color:"#94a3b8",marginTop:2}}>one shot</div>
            </div>
            {card("pass@n (oracle)", metrics.passN===1, `any of ${metrics.n} correct`, sc.color)}
            {card("maj@n (vote)", metrics.maj, "self-consistency", "#6366f1")}
            {card("Best-of-n", metrics.best, "verifier-reranked", "#8b5cf6")}
          </div>

          {/* pass@k curve */}
          <div style={{background:"white",border:"1.5px solid #e2e8f0",borderRadius:14,padding:"16px 18px"}}>
            <div style={{fontFamily:"'Nunito'",fontSize:10,fontWeight:700,textTransform:"uppercase",
              letterSpacing:"0.07em",color:"#0d9488",marginBottom:10}}>
              Unbiased pass@k estimate vs. k &nbsp;·&nbsp; 1 − C(n−c, k) / C(n, k)</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:5,height:120,paddingBottom:18,position:"relative"}}>
              {metrics.curve.map((v,i) => (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",
                  justifyContent:"flex-end",height:"100%"}}>
                  <div style={{fontFamily:"'Nunito'",fontSize:9,fontWeight:700,color:"#0d9488",marginBottom:2}}>
                    {(v*100).toFixed(0)}</div>
                  <div style={{width:"82%",height:`${v*100}%`,minHeight:2,
                    background:`linear-gradient(180deg,${sc.color},#6366f1)`,borderRadius:"4px 4px 0 0",
                    transition:"height .5s cubic-bezier(.4,0,.2,1)"}}/>
                  <div style={{fontFamily:"'Nunito'",fontSize:9,color:"#94a3b8",position:"absolute",
                    bottom:0}}>{i+1}</div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"'Nunito'",fontSize:11,color:"#64748b",marginTop:6,textAlign:"center"}}>
              k  (number of attempts) →
            </div>
            <div style={{marginTop:10,fontFamily:"'Cormorant Garamond'",fontStyle:"italic",fontSize:13,
              color:"#475569",lineHeight:1.6,background:"#f8fafc",borderRadius:8,padding:"9px 12px",
              borderLeft:`4px solid ${sc.color}`}}>
              The curve is the model’s reachable ceiling. The gap from pass@1 to pass@k is headroom a

          </div>
        </div>
      )}

      {!samples && !drawing && (
        <div style={{background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:12,

          <b> Best-of-n</b> depends on the verifier’s accuracy. Each draw is a fresh random sample — run it a few times.

      padding:"36px 20px",display:"flex",justifyContent:"center",alignItems:"flex-start"}}>

      <div style={{position:"fixed",top:-80,right:-80,width:300,height:300,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(99,102,241,.12),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:-60,left:-60,width:260,height:260,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(13,148,136,.12),transparent 70%)",pointerEvents:"none"}}/>

      {showSettings && (
        <SettingsPanel settings={settings} onSave={setSettings} onClose={() => setShowSettings(false)}/>
      )}

      <div style={{width:"100%",maxWidth:780,position:"relative"}}>

        {/* Header */}
        <div className="fu" style={{marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:28,height:28,borderRadius:8,
                background:"linear-gradient(135deg,#6366f1,#0d9488)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🔬</div>
              <span style={{color:"#94a3b8",fontFamily:"'Nunito'",fontSize:11,
                letterSpacing:"0.15em",textTransform:"uppercase",fontWeight:700}}>
                LLM Evaluation Patterns
              </span>
            </div>
            {/* Settings button */}
            <button onClick={() => setShowSettings(true)} style={{
              background: live ? "#f0fdf4" : "white",
              border: `1.5px solid ${live ? "#86efac" : "#e2e8f0"}`,
              borderRadius:10,padding:"6px 14px",cursor:"pointer",
              fontFamily:"'Nunito'",fontSize:12,fontWeight:600,
              color: live ? "#16a34a" : "#64748b",
              display:"flex",alignItems:"center",gap:6,transition:"all .18s"}}>
              🔑 {live ? `Connected · ${settings.provider}` : "Add API Key"}
            </button>
          </div>
          <h1 style={{color:"#1e293b",fontFamily:"'Cormorant Garamond'",
            fontSize:36,fontWeight:700,margin:0,lineHeight:1.2}}>
            Evals,{" "}
            <span style={{fontStyle:"italic",
              background:"linear-gradient(90deg,#6366f1,#0d9488)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              Demystified
            </span>
          </h1>
          <p style={{color:"#94a3b8",fontFamily:"'Nunito'",fontSize:13,marginTop:10,lineHeight:1.65}}>
            Interactive walkthrough of LLM-as-a-Judge, Verifier, and pass@k. Works in simulation mode or live with OpenRouter, Gemini, or Ollama.
          </p>
        </div>

        {/* Tab bar */}
        <div className="fu1" style={{display:"flex",gap:3,marginBottom:20,
          background:"white",borderRadius:12,padding:4,width:"fit-content",
          border:"1.5px solid #e2e8f0",boxShadow:"0 4px 24px rgba(99,102,241,0.08)",flexWrap:"wrap"}}>
          {tabs.map(([k,l]) => (
            <button key={k} onClick={() => setTab(k)} style={{
              background:tab===k?"#e0e7ff":"transparent",border:"none",
              boxShadow:tab===k?"inset 0 0 0 1.5px #a5b4fc":"none",
              borderRadius:8,padding:"8px 18px",cursor:"pointer",fontFamily:"'Nunito'",
              fontSize:13,fontWeight:600,color:tab===k?"#6366f1":"#64748b",transition:"all .2s"}}>
              {l}
            </button>
          ))}
        </div>

        {/* Main card */}
        <div className="fu2" style={{background:"white",border:"1.5px solid #e2e8f0",
          borderRadius:22,padding:"28px 26px",
          boxShadow:"0 12px 40px rgba(99,102,241,0.13),0 2px 8px rgba(0,0,0,0.05)"}}>
          {tab==="overview"  && <OverviewTab/>}
          {tab==="judge"     && <JudgeTab settings={settings}/>}
          {tab==="verifier"  && <VerifierTab settings={settings}/>}
          {tab==="passk"     && <PassKTab/>}
          {tab==="code"      && <CodeTab/>}
        </div>

        <p className="fu3" style={{color:"#94a3b8",fontFamily:"'Nunito'",fontSize:11,
          textAlign:"center",marginTop:16}}>
          Seminar demo · LLM Evals: Verifier · pass@k · Judge · Supports OpenRouter · Gemini · Ollama · or simulation
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
